###############################################################################
#  docker-compose.prod.yml
#  Perfil de PRODUCCIÓN — bajo consumo de recursos, sin hot-reload, sin scraper.
#
#  Requisito: crear el archivo  backend/.env.prod  antes de levantar.
#             (copiar backend/.env y cambiar 127.0.0.1 → nombres de contenedor)
#
#  Uso básico:
#    docker compose -f docker-compose.prod.yml up -d
#
#  Con Ollama (solo en máquina con GPU NVIDIA):
#    docker compose -f docker-compose.prod.yml --profile ollama up -d
###############################################################################

networks:
  prod_network:
    driver: bridge

services:

  # ======================== BASES DE DATOS =====================================

  mongodb:
    image: mongo:8
    container_name: mongodb_prod
    restart: unless-stopped
    # Limitar caché de WiredTiger a 512 MB (por defecto usa el 50% de la RAM)
    command: --wiredTigerCacheSizeGB 0.5
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: doctoralia
    volumes:
      - ./data/mongodb:/data/db
      - ./data/mongodb_config:/data/configdb
    networks:
      - prod_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 5s
      retries: 5

  mysql:
    image: mysql:8.0
    container_name: mysql_prod
    restart: unless-stopped
    # Lee MYSQL_ROOT_PASSWORD directamente del env del backend para no duplicar variables
    env_file:
      - ./backend/.env.prod
    environment:
      MYSQL_DATABASE: medicos_db
      MYSQL_ROOT_HOST: '%'
    # Limitar uso de memoria de MySQL a ~256 MB
    command: >
      --innodb-buffer-pool-size=128M
      --max-connections=50
      --performance-schema=OFF
    ports:
      - "3310:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
      # Init script: se ejecuta SOLO cuando la BD está vacía (primer arranque)
      - ./backend/db_migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - prod_network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p\"$$MYSQL_ROOT_PASSWORD\" 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  # ============================ BACKEND ========================================

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod   # <-- Dockerfile de producción (sin --reload, sin Playwright)
    image: pt_backend:prod
    container_name: backend_prod
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.prod         # <-- variables con hostnames Docker (mongodb_prod, mysql_prod)
    depends_on:
      mongodb:
        condition: service_healthy
      mysql:
        condition: service_healthy
    networks:
      - prod_network
    # Permite alcanzar LM Studio corriendo en la máquina anfitriona desde el contenedor.
    # En Linux, Docker no define host.docker.internal por defecto.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # SIN volumen montado: el código ya está dentro de la imagen
    deploy:
      resources:
        limits:
          # 1 GB permite asyncio.to_thread durante análisis IA largos sin OOM
          memory: 1024M

  # ============================ FRONTEND (Nginx) ================================

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod   # <-- build estático + Nginx (sin Vite dev server)
    image: pt_frontend:prod
    container_name: frontend_prod
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - prod_network
    # SIN volumen montado: los archivos estáticos ya están dentro de la imagen
    deploy:
      resources:
        limits:
          memory: 64M

  # ============= OLLAMA (manual: --profile ollama) =============================
  # Solo activar en máquinas con GPU NVIDIA.
  # Uso: docker compose -f docker-compose.prod.yml --profile ollama up -d ollama

  ollama:
    image: ollama/ollama:latest
    container_name: ollama_prod
    profiles: ["ollama"]
    restart: "no"
    ports:
      - "11434:11434"
    volumes:
      - ./data/ollama:/root/.ollama
    environment:
      - OLLAMA_NUM_PARALLEL=4
      - OLLAMA_MAX_QUEUE=20
      # Mantener el modelo cargado en VRAM indefinidamente (evita cold-start de minutos)
      - OLLAMA_KEEP_ALIVE=-1
    networks:
      - prod_network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
