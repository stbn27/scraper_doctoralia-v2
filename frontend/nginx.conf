server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Archivos estáticos de React — SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy inverso al backend FastAPI
    location /api/ {
        proxy_pass http://backend_prod:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts para peticiones lentas (ej: análisis IA)
        proxy_connect_timeout 60s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;

        # Tamaño máximo de body (por si envías imágenes/archivos)
        client_max_body_size  10M;
    }
}