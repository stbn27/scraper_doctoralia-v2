version: '3.8'
services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: medicos_db
    ports: ["3306:3306"]
    volumes: [mysql_data:/var/lib/mysql]

  mongodb:
    image: mongo:7
    ports: ["27017:27017"]
    volumes: [mongo_data:/data/db]

  ollama:
    image: ollama/ollama
    ports: ["11434:11434"]
    volumes: [ollama_models:/root/.ollama]

  backend:
    build: ./backend
    ports: ["8000:8000"]
    depends_on: [mysql, mongodb, ollama]
    env_file: .env

volumes:
  mysql_data:
  mongo_data:
  ollama_models: